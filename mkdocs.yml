            - notes/algorithm/leetcode/index.md
            - notes/algorithm/leetcode/周赛501.md
      - Python:
          - notes/python/index.md
      - CS336:
          - notes/cs336/index.md
  - 📖 Paper Reading:
      - paperreading/index.md
  - 🏷️ Tags: tags/index.md
  - 👤 About:
      - about/index.md
      - Running:
          - about/running/index.md
      - Scenery:
          - about/scenery/index.md
